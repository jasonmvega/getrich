name: Run Trading Script 5x Daily

on:
  schedule:
    # Five times a day at 10:00, 12:00, 14:00, 16:00, 18:00 UTC
    - cron: '0 10,12,14,16,18 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # No external dependencies needed for your current script
        # If you add dependencies later, list them here, e.g.,
        # pip install requests

    - name: Run trading script
      env:
        GETRICH_API_KEY: ${{ secrets.GETRICH_API_KEY }}
        GETRICH_API_SECRET: ${{ secrets.GETRICH_API_SECRET }}
        GETRICH_BASE_URL: ${{ secrets.GETRICH_BASE_URL }}
        GETRICH_DATA_URL: ${{ secrets.GETRICH_DATA_URL }}
      run: python ./project.py
